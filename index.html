<!DOCTYPE html>
<!--
  Apple Notes — Dark Mode Web App  (v2: grid + card-expand)
  ============================================================
  GitHub Pages Deployment:
  1. Push all files to a GitHub repo.
  2. Settings → Pages → Source: main / root
  3. Live at https://<username>.github.io/<repo>/

  Admin: CTRL+SPACE → PIN: 0310
-->
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#1c1c1e" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="robots" content="noindex, nofollow" />
  <title>Notas — Marcelo</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><text y='26' font-size='28'>🗒️</text></svg>" />
</head>
<body>

<!-- Admin indicator pill -->
<div id="admin-indicator">✦ Modo desarrollador</div>

<div id="app">

  <!-- ══════════════════════════
       LIST SCREEN
  ══════════════════════════ -->
  <section id="list-screen">

    <header class="list-header">
      <div class="header-top">
        <h1 class="header-title">Notas</h1>
        <span class="header-count" id="note-count">0 notas</span>
      </div>
      <div class="search-bar" role="search">
        <svg class="search-icon" viewBox="0 0 20 20" fill="currentColor">
          <path fill-rule="evenodd" d="M9 3.5a5.5 5.5 0 100 11 5.5 5.5 0 000-11zM2 9a7 7 0 1112.452 4.391l3.328 3.329a.75.75 0 11-1.06 1.06l-3.329-3.328A7 7 0 012 9z" clip-rule="evenodd"/>
        </svg>
        <input type="search" id="search-input" class="search-input"
               placeholder="Buscar" autocomplete="off" spellcheck="false" />
      </div>
    </header>

    <p class="section-label">Mis notas</p>

    <!-- Grid of note cards -->
    <main id="notes-list"></main>

  </section>

  <!-- FAB — new note (admin only) -->
  <button id="fab-new" aria-label="Nueva nota">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
      <path d="M12 5v14M5 12h14"/>
    </svg>
  </button>

</div><!-- /app -->

<!-- ══════════════════════════════════════════════════════
     CARD EXPAND OVERLAY
     JS positions this element over the tapped card,
     then transitions it to fullscreen.
═══════════════════════════════════════════════════════ -->
<div id="expand-scrim"></div>

<div id="card-expand" role="dialog" aria-modal="true" aria-label="Nota completa">
  <div class="expand-inner">

    <!-- Header -->
    <header class="expand-header">
      <button class="expand-back-btn" id="expand-back-btn">
        <svg viewBox="0 0 10 18" fill="none" stroke="currentColor" stroke-width="2.5"
             stroke-linecap="round" stroke-linejoin="round">
          <path d="M9 1L1 9l8 8"/>
        </svg>
        Notas
      </button>
      <div class="expand-title-wrap">
        <h2 class="expand-title" id="expand-title"></h2>
        <p  class="expand-date"  id="expand-date"></p>
      </div>
      <!-- Admin controls (hidden unless admin mode) -->
      <div class="expand-admin-bar" id="expand-admin-bar">
        <button class="btn btn-yellow" id="expand-edit-btn" aria-label="Editar">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <path d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/>
          </svg>
        </button>
        <button class="btn btn-red" id="expand-delete-btn" aria-label="Eliminar">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <path d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/>
          </svg>
        </button>
      </div>
    </header>

    <!-- Body -->
    <div class="expand-body" id="expand-body">
      <p class="expand-meta">
        De <span id="expand-sender"></span> para <span id="expand-receiver"></span>
      </p>
      <p class="expand-content" id="expand-content"></p>
    </div>

  </div>
</div>

<!-- Toast -->
<div id="toast" role="status" aria-live="polite"></div>


<!-- ══════════════════════════════════════════════════════
     MODAL: Password PIN
═══════════════════════════════════════════════════════ -->
<div class="modal-overlay" id="password-modal" role="dialog" aria-modal="true">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <h2 class="modal-title">Modo desarrollador</h2>
    <p  class="modal-subtitle">Ingresa el código de acceso.</p>
    <div class="pin-dots">
      <div class="pin-dot"></div>
      <div class="pin-dot"></div>
      <div class="pin-dot"></div>
      <div class="pin-dot"></div>
    </div>
    <div class="numpad" id="numpad">
      <button class="numpad-key" data-value="1">1<sub></sub></button>
      <button class="numpad-key" data-value="2">2<sub>ABC</sub></button>
      <button class="numpad-key" data-value="3">3<sub>DEF</sub></button>
      <button class="numpad-key" data-value="4">4<sub>GHI</sub></button>
      <button class="numpad-key" data-value="5">5<sub>JKL</sub></button>
      <button class="numpad-key" data-value="6">6<sub>MNO</sub></button>
      <button class="numpad-key" data-value="7">7<sub>PQRS</sub></button>
      <button class="numpad-key" data-value="8">8<sub>TUV</sub></button>
      <button class="numpad-key" data-value="9">9<sub>WXYZ</sub></button>
      <button class="numpad-key key-cancel" data-value="cancel">Cancelar</button>
      <button class="numpad-key" data-value="0">0</button>
      <button class="numpad-key key-delete" data-value="delete">
        <svg width="20" height="15" viewBox="0 0 24 18" fill="currentColor">
          <path d="M22 1H7c-.69 0-1.23.35-1.59.88L0 8l5.41 6.11c.36.53.9.89 1.59.89h15c1.1 0 2-.9 2-2V3c0-1.1-.9-2-2-2zm-3.59 9L17 11.41 15.59 10 14 11.41 12.59 10 11 11.41 9.59 10 8 11.41 6.59 10 8 8.41 9.59 7 11 8.41 12.59 7 14 8.41 15.59 7 17 8.41 18.41 7 20 8.41z"/>
        </svg>
      </button>
    </div>
  </div>
</div>


<!-- ══════════════════════════════════════════════════════
     MODAL: Create / Edit Note
═══════════════════════════════════════════════════════ -->
<div class="modal-overlay" id="note-edit-modal" role="dialog" aria-modal="true">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <h2 class="modal-title" id="edit-modal-title">Nueva nota</h2>
    <div class="form-group">
      <label class="form-label" for="edit-title-input">Título</label>
      <input type="text" id="edit-title-input" class="form-input"
             placeholder="Título de la nota" maxlength="120" autocomplete="off" />
    </div>
    <div class="form-group">
      <label class="form-label" for="edit-content-input">Contenido</label>
      <textarea id="edit-content-input" class="form-textarea"
                placeholder="Escribe tu nota…"></textarea>
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost"  id="cancel-edit-btn">Cancelar</button>
      <button class="btn btn-yellow" id="save-note-btn">Guardar nota</button>
    </div>
  </div>
</div>


<!-- ══════════════════════════════════════════════════════
     MODAL: Delete Confirm
═══════════════════════════════════════════════════════ -->
<div class="modal-overlay" id="delete-confirm-modal" role="dialog" aria-modal="true">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <h2 class="modal-title">Eliminar nota</h2>
    <p  class="modal-subtitle">¿Eliminar <span id="delete-note-title">esta nota</span>? No se puede deshacer.</p>
    <div class="delete-actions">
      <button class="btn btn-red"   id="confirm-delete-btn">Eliminar</button>
      <button class="btn btn-ghost" id="cancel-delete-btn">Cancelar</button>
    </div>
  </div>
</div>

<script src="js/script.js"></script>
</body>
</html>
