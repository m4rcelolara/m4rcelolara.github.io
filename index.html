<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AUGI</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=Montserrat:wght@200;300;400;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --negro: #0f0f0f;
      --blanco: #f0ece4;
      --gris: #888;
      --acento: #41c8fd;
    }

    html, body {
      height: 100%;
      background: var(--negro);
      color: var(--blanco);
      font-family: 'Montserrat', sans-serif;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 100;
      opacity: 0.4;
    }

    /* ── NAVBAR ── */
    nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 50;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0 24px;
      height: 70px;
      background: rgba(8,8,8,0.88);
      backdrop-filter: blur(14px);
      border-bottom: 1px solid rgba(65,200,253,0.07);
    }

    .nav-logo {
      height: 60px;
      opacity: 0;
      animation: fadeIn 0.5s ease 0.3s forwards;
    }

    /* ── HERO ── */
    .hero {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
      padding: 80px 24px 40px;
    }

    .luz {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      pointer-events: none;
      z-index: 0;
    }

    .luz-1 {
      width: 500px; height: 500px;
      background: radial-gradient(circle, rgba(65,200,253,0.12) 0%, transparent 70%);
      top: 10%; left: 15%;
      animation: parpadeo 6s ease-in-out infinite;
    }

    .luz-2 {
      width: 400px; height: 400px;
      background: radial-gradient(circle, rgba(65,200,253,0.08) 0%, transparent 70%);
      bottom: 15%; right: 10%;
      animation: parpadeo 8s ease-in-out 2s infinite;
    }

    .luz-3 {
      width: 300px; height: 300px;
      background: radial-gradient(circle, rgba(65,200,253,0.06) 0%, transparent 70%);
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      animation: parpadeo 5s ease-in-out 1s infinite;
    }

    @keyframes parpadeo {
      0%, 100% { opacity: 0.6; }
      50%       { opacity: 1;   }
    }

    .float-canvas {
      position: absolute;
      inset: 0;
      z-index: 1;
      pointer-events: none;
      overflow: hidden;
    }

    .float-img {
      position: absolute;
      bottom: -200px;
      width: 160px;
      height: 110px;
      object-fit: cover;
      border-radius: 6px;
      opacity: 0;
      will-change: transform, opacity;
    }

    .hero-logo-wrap {
      position: relative;
      z-index: 2;
      opacity: 0;
      transform: translateY(24px);
      animation: fadeUpSimple 1.4s cubic-bezier(0.16,1,0.3,1) 0.6s forwards;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 28px;
      width: 100%;
      max-width: 800px;
      text-align: center;
    }

    .hero-tagline {
      font-weight: 700;
      font-size: clamp(22px, 5vw, 44px);
      letter-spacing: 1.5px;
      text-transform: uppercase;
      text-align: center;
      color: var(--acento);
      opacity: 0;
      animation: fadeUpSimple 1s ease 1.4s forwards;
      line-height: 1.15;
    }

    @keyframes fadeIn {
      to { opacity: 1; }
    }

    @keyframes fadeUpSimple {
      to { opacity: 1; transform: translateY(0); }
    }

    /* ── SERVICIOS ── */
    .services {
      padding: 80px 24px 100px;
      background: var(--negro);
    }

    .services h2 {
      font-family: 'Montserrat', sans-serif;
      font-size: clamp(22px, 5vw, 36px);
      font-weight: bold;
      text-align: center;
      color: var(--acento);
      margin-bottom: 48px;
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    /* ── SLIDER LAYOUT ── */
    .service-slider {
      width: 100%;
      max-width: 1080px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    /* En pantallas grandes: dos columnas */
    @media (min-width: 700px) {
      .service-slider {
        display: grid;
        grid-template-columns: 1.35fr 0.85fr;
        align-items: start;
      }
    }

    /* ── CARD ── */
    .slider-card {
      position: relative;
      overflow: hidden;
      border-radius: 8px;
      border: 1px solid rgba(255,255,255,0.08);
      background: rgba(255,255,255,0.02);
      box-shadow: 0 16px 36px rgba(0,0,0,0.2);
      transition: opacity 0.35s ease, transform 0.35s ease;
      width: 100%;
    }

    /* Imagen: usa aspect-ratio para que nunca se corte */
    .slider-image-wrap {
      position: relative;
      width: 100%;
      aspect-ratio: 4 / 3;
      overflow: hidden;
      background: #050506;
    }

    .service-image {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center;
      display: block;
    }

    .service-overlay {
      position: absolute;
      left: 0; right: 0; bottom: 0;
      padding: 12px 16px;
      background: rgba(0,0,0,0.72);
      backdrop-filter: blur(18px);
      border-top: 1px solid rgba(255,255,255,0.08);
    }

    .service-title {
      display: block;
      font-family: 'Montserrat', sans-serif;
      font-size: clamp(16px, 4vw, 22px);
      font-weight: bold;
      color: var(--acento);
      text-transform: uppercase;
      text-align: center;
      margin: 0;
    }

    /* ── PANEL DERECHO ── */
    .service-right {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .slider-info {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .service-description {
      color: var(--blanco);
      font-family: 'Montserrat', sans-serif;
      font-size: clamp(14px, 3.5vw, 18px);
      font-weight: bold;
      line-height: 1.5;
      opacity: 0.95;
    }

    /* ── BOTONES ── */
    .btn-group {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .demo-button {
      display: block;
      width: 100%;
      padding: 12px 16px;
      color: var(--acento);
      background: rgba(65,200,253,0.05);
      border: 1px solid rgba(65,200,253,0.25);
      border-radius: 100px;
      text-transform: uppercase;
      letter-spacing: 3px;
      font-weight: 700;
      font-size: 13px;
      font-family: 'Montserrat', sans-serif;
      cursor: pointer;
      transition: background 0.25s ease, transform 0.2s ease, border-color 0.25s ease;
      touch-action: manipulation;
      text-align: center;
    }

    @media (hover: hover) and (pointer: fine) {
      .demo-button:hover {
        background: rgba(65,200,253,0.2);
        transform: translateY(-1px);
        border-color: rgba(65,200,253,0.6);
      }
    }

    /* ── CONTROLES ── */
    .slider-controls {
      display: flex;
      justify-content: center;
      gap: 16px;
    }

    .slider-btn {
      width: 56px;
      height: 56px;
      border-radius: 50%;
      border: 1px solid rgba(255,255,255,0.12);
      background: rgba(15,15,15,0.85);
      color: var(--blanco);
      font-size: 28px;
      cursor: pointer;
      transition: transform 0.2s ease, background 0.2s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      touch-action: manipulation;
    }

    @media (hover: hover) and (pointer: fine) {
      .slider-btn:hover {
        transform: scale(1.05);
        background: rgba(65,200,253,0.15);
      }
    }
  </style>
</head>
<body>

  <nav>
    <img src="recursos/interfaz/logotitulo.png" class="nav-logo" alt="AUGI Logo">
  </nav>

  <section class="hero">
    <div class="luz luz-1"></div>
    <div class="luz luz-2"></div>
    <div class="luz luz-3"></div>
    <div class="float-canvas" id="floatCanvas"></div>

    <div class="hero-logo-wrap">
      <h1 class="hero-tagline">Producción audiovisual profesional para eventos sociales y empresariales en Monterrey</h1>
    </div>
  </section>

  <section class="services">
    <h2>Nuestros servicios</h2>
    <div class="service-slider">

      <div class="service-left">
        <div class="slider-card" id="serviceCard">
          <div class="slider-image-wrap">
            <img src="recursos/slider/boda.JPG" alt="Producción de Boda" class="service-image" id="serviceImage">
            <div class="service-overlay">
              <h3 class="service-title" id="serviceTitle">Producción de Boda</h3>
            </div>
          </div>
        </div>
      </div>

      <div class="service-right">
        <div class="slider-info">
          <p class="service-description" id="serviceDescription">
            Cobertura completa de eventos sociales con fotografía y video profesional, edición incluida y entrega digital.
          </p>
          <div class="btn-group">
            <button class="demo-button" id="demoButton">Ver demo reel</button>
            <button class="demo-button" id="solicitarButton">Solicitar</button>
          </div>
        </div>
        <div class="slider-controls">
          <button class="slider-btn" id="prevService" aria-label="Anterior servicio">‹</button>
          <button class="slider-btn" id="nextService" aria-label="Siguiente servicio">›</button>
        </div>
      </div>

    </div>
  </section>

  <script>
    const imagenes = [
      'recursos/float/1.JPG',
      'recursos/float/2.JPG',
      'recursos/float/3.JPG',
      'recursos/float/4.JPG',
    ];

    const canvas   = document.getElementById('floatCanvas');
    const W        = () => canvas.offsetWidth;
    const H        = () => canvas.offsetHeight;
    let   imgIndex = 0;

    function lanzar() {
      const src       = imagenes[imgIndex % imagenes.length];
      imgIndex++;

      const img       = document.createElement('img');
      img.src         = src;
      img.className   = 'float-img';

      const margen    = 30;
      const areaWidth = W() + 400;
      const xInicio   = -200 + Math.random() * areaWidth;
      const escala    = 0.7 + Math.random() * 0.7;

      img.style.width  = (160 * escala) + 'px';
      img.style.height = (110 * escala) + 'px';
      img.style.left   = xInicio + 'px';

      const duracion    = 9000 + Math.random() * 8000;
      const amplitud    = 80   + Math.random() * 90;
      const fase        = Math.random() * Math.PI * 2;

      canvas.appendChild(img);

      const inicio      = performance.now();
      const alturaTotal = H() + 940;

      function tick(ahora) {
        const t        = (ahora - inicio) / duracion;
        const progreso = t;

        if (t >= 1) { img.remove(); return; }

        const y = H() - progreso * alturaTotal;
        const x = xInicio + Math.sin(fase + progreso * Math.PI * 4) * amplitud;

        let opacidad;
        if (progreso < 0.12)      opacidad = (progreso / 0.12) * 0.55;
        else if (progreso > 0.78) opacidad = ((1 - progreso) / 0.22) * 0.55;
        else                      opacidad = 0.55;

        img.style.transform = `translate(${x - xInicio}px, ${y}px)`;
        img.style.opacity   = opacidad;

        requestAnimationFrame(tick);
      }

      requestAnimationFrame(tick);
    }

    setTimeout(() => { lanzar(); setInterval(lanzar, 800); }, 10);

    const services = [
      {
        title: 'Producción de XV Años',
        description: 'Cobertura completa de eventos sociales con fotografía y video profesional, edición incluida y entrega digital.',
        image: 'recursos/slider/xv.JPG'
      },
      {
        title: 'Evento Corporativo',
        description: 'Grabación de eventos empresariales con producción pulida y entrega de contenido listo para presentar.',
        image: 'recursos/slider/placeholder.jfif'
      },
      {
        title: 'Producción de Boda',
        description: 'Cobertura completa de eventos sociales con fotografía y video profesional, edición incluida y entrega digital.',
        image: 'recursos/slider/boda.JPG'
      }
    ];

    const serviceImage       = document.getElementById('serviceImage');
    const serviceTitle       = document.getElementById('serviceTitle');
    const serviceDescription = document.getElementById('serviceDescription');
    const serviceCard        = document.getElementById('serviceCard');
    let   serviceIndex       = 2;

    function updateService(index) {
      serviceCard.style.transition = 'opacity 0.35s ease, transform 0.35s ease';
      serviceCard.style.opacity    = '0';
      serviceCard.style.transform  = 'translateX(-60px) scale(0.92)';

      setTimeout(() => {
        const service           = services[index];
        serviceImage.src        = service.image;
        serviceImage.alt        = service.title;
        serviceTitle.textContent       = service.title;
        serviceDescription.textContent = service.description;

        serviceCard.style.transition = 'none';
        serviceCard.style.opacity    = '0';
        serviceCard.style.transform  = 'translateX(60px) scale(0.92)';

        setTimeout(() => {
          serviceCard.style.transition = 'opacity 0.35s ease, transform 0.35s ease';
          serviceCard.style.opacity    = '1';
          serviceCard.style.transform  = 'translateX(0) scale(1)';
        }, 50);
      }, 350);
    }

    document.getElementById('prevService').addEventListener('click', () => {
      serviceIndex = (serviceIndex - 1 + services.length) % services.length;
      updateService(serviceIndex);
    });

    document.getElementById('nextService').addEventListener('click', () => {
      serviceIndex = (serviceIndex + 1) % services.length;
      updateService(serviceIndex);
    });

    document.getElementById('demoButton').addEventListener('click', () => {
      alert('Demo reel pronto disponible. En breve agregaremos el video de YouTube para este servicio.');
    });

    document.getElementById('solicitarButton').addEventListener('click', () => {
      alert('Función de solicitud próximamente disponible.');
    });
  </script>

</body>
</html>
