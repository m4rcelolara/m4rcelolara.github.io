<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portafolio</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=Montserrat:wght@200;300;400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --negro: #080808;
      --blanco: #f0ece4;
      --gris: #888;
      --acento: #c8b89a;
    }

    html, body {
      height: 100%;
      background: var(--negro);
      color: var(--blanco);
      font-family: 'Montserrat', sans-serif;
      overflow-x: hidden;
    }

    /* GRAIN */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 100;
      opacity: 0.4;
    }

    /* ── NAVBAR ── */
    nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 50;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 48px;
      height: 60px;
      background: rgba(8,8,8,0.88);
      backdrop-filter: blur(14px);
      border-bottom: 1px solid rgba(200,184,154,0.07);
    }

    .nav-logo {
      height: 22px;        /* pequeño pero legible */
      opacity: 0;
      animation: fadeUp 1s ease 0.3s forwards;
    }

    .nav-links {
      display: flex;
      gap: 36px;
      list-style: none;
      opacity: 0;
      animation: fadeUp 1s ease 0.5s forwards;
    }

    .nav-links li a {
      font-weight: 300;
      font-size: 10px;
      letter-spacing: 3.5px;
      text-transform: uppercase;
      color: var(--gris);
      text-decoration: none;
      transition: color 0.3s;
    }

    .nav-links li a:hover { color: var(--acento); }

    /* ── HERO ── */
    .hero {
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    .hero::before, .hero::after {
      content: '';
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      width: 1px;
      background: linear-gradient(to bottom, transparent, rgba(200,184,154,0.12), transparent);
    }
    .hero::before { top: 0;    height: 28%; }
    .hero::after  { bottom: 0; height: 28%; }

    .hero-logo-wrap {
      opacity: 0;
      transform: translateY(24px);
      animation: fadeUp 1.4s cubic-bezier(0.16,1,0.3,1) 0.6s forwards;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 28px;
    }

    /* mediano-rozando pequeño */
    .hero-logo {
      width: min(340px, 62vw);
      filter: brightness(0) invert(1);
    }

    .hero-tagline {
      font-weight: 200;
      font-size: 10px;
      letter-spacing: 6px;
      text-transform: uppercase;
      color: var(--acento);
      opacity: 0;
      animation: fadeUp 1s ease 1.4s forwards;
    }

    /* SCROLL HINT */
    .scroll-hint {
      position: absolute;
      bottom: 36px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      opacity: 0;
      animation: fadeUp 1s ease 2s forwards;
    }

    .scroll-hint span {
      font-size: 8px;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: var(--gris);
    }

    .scroll-line {
      width: 1px;
      height: 36px;
      background: linear-gradient(to bottom, var(--acento), transparent);
      animation: scrollPulse 2.2s ease-in-out infinite;
    }

    /* ── SECCIÓN FUTURA ── */
    .coming-soon {
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      border-top: 1px solid rgba(200,184,154,0.05);
    }

    .coming-soon p {
      font-size: 9px;
      letter-spacing: 5px;
      text-transform: uppercase;
      color: rgba(136,136,136,0.25);
    }

    /* ── ANIMACIONES ── */
    @keyframes fadeUp {
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes scrollPulse {
      0%, 100% { opacity: 0.3; }
      50%       { opacity: 1;   }
    }
  </style>
</head>
<body>

  <!-- NAVBAR -->
  <nav>
    <img src="recursos/interfaz/logotitulo.png" class="nav-logo" alt="Logo">
    <ul class="nav-links">
      <li><a href="#">Inicio</a></li>
      <!-- Agrega más links aquí a futuro -->
    </ul>
  </nav>

  <!-- HERO -->
  <section class="hero">
    <div class="hero-logo-wrap">
      <img src="recursos/interfaz/logoentero.png" class="hero-logo" alt="Logo completo">
      <p class="hero-tagline">Foto · Video · Audio</p>
    </div>

    <div class="scroll-hint">
      <span>Scroll</span>
      <div class="scroll-line"></div>
    </div>
  </section>

  <!-- SECCIÓN FUTURA -->
  <section class="coming-soon">
    <p>Contenido próximamente</p>
  </section>

</body>
</html>
