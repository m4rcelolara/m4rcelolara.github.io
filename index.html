<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>AUGI | Producción Audiovisual</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=Montserrat:wght@200;300;400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

  <!-- ══ NAVBAR ══ -->
  <nav>
    <img src="recursos/interfaz/logotitulo.png" class="nav-logo" alt="Logo AUGI">
  </nav>

  <!-- ══ HERO ══ -->
  <section class="hero">
    <div class="luz luz-1"></div>
    <div class="luz luz-2"></div>
    <div class="luz luz-3"></div>
    <div class="float-canvas" id="floatCanvas"></div>

    <div class="hero-logo-wrap">
      <h1 class="hero-tagline">Producción profesional en Monterrey</h1>
    </div>

    <h2 class="services-title">Te ofrecemos:</h2>

    <div class="categories-container">
      <div class="category-card" data-category="social">
        <img src="recursos/slider/boda.JPG" alt="Eventos Sociales" class="category-image">
        <div class="category-overlay">
          <div class="category-btn">Sociales</div>
        </div>
      </div>
      <div class="category-card" data-category="corporate">
        <img src="recursos/slider/placeholder.jfif" alt="Eventos Corporativos" class="category-image">
        <div class="category-overlay">
          <div class="category-btn">Corporativo</div>
        </div>
      </div>
    </div>
  </section>

  <!-- ══ POPUP DE CATEGORÍA ══ -->
  <div id="popupCategoria" class="popup-overlay">
    <div class="popup-container">

      <button class="popup-close" id="closePopupBtn">&#215;</button>

      <!-- Fila: flecha izquierda + card + flecha derecha -->
      <div class="popup-slider-row">
        <button class="popup-nav-btn" id="popupPrevBtn">&#8249;</button>

        <div class="popup-slider-card">
          <div class="popup-slider-image-wrap">
            <img src="" alt="" class="popup-service-image" id="popupServiceImage">
            <div class="popup-service-overlay" id="popupServiceOverlay"></div>
          </div>
        </div>

        <button class="popup-nav-btn" id="popupNextBtn">&#8250;</button>
      </div>

      <!-- Descripción y botones -->
      <div class="popup-slider-info">
        <p class="popup-service-description" id="popupServiceDescription"></p>
        <div class="popup-btn-group">
          <button class="popup-demo-button"      id="popupDemoButton">Ver demo reel</button>
          <button class="popup-solicitar-button" id="popupSolicitarButton">Contáctanos</button>
        </div>
      </div>

    </div>
  </div>

  <!-- ══ OVERLAY DE CONTACTO ══ -->
  <div id="overlayContacto" role="dialog" aria-modal="true" aria-label="Formulario de contacto">
    <div id="panelContacto">

      <button id="btnCerrarContacto" aria-label="Cerrar panel">&#215;</button>

      <span class="etiqueta-seccion">Contactar para</span>
      <p id="nombreServicioContacto">–</p>
      <p class="pista-contacto">Para continuar, por favor ayúdenos con información de su evento.</p>

      <div class="campo-grupo">
        <label for="campoBusqueda">Lugar de su evento</label>
        <input id="campoBusqueda" type="text" placeholder="Escribir dirección del salón / lugar" autocomplete="off"/>
        <div id="contenedorMapa">
          <div id="mapaLeaflet"></div>
        </div>
        <p id="textoUbicacion"></p>
      </div>

      <div class="campo-grupo">
        <label for="campoFecha">Fecha de su evento</label>
        <input id="campoFecha" type="date"/>
      </div>

      <button id="btnWhatsapp" disabled>
        <img src="recursos/interfaz/whatsappicon.png" alt="" class="icono-wa"/>
        Contactar
      </button>

    </div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="main.js"></script>

</body>
</html>
